<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VANTA DRIFT</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:#0a0a0a;
  color:white;
}

/* HEADER */
header {
  text-align:center;
  padding:20px;
}
header img {
  width:100px;
}

/* SLIDER */
.slider {
  height:60vh;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.slide {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:1s;
}

.slide img {
  max-width:90%;
  max-height:100%;
  object-fit:contain;
}

.slide.active {
  opacity:1;
}

/* PRODUCTS */
.products {
  padding:40px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
}

.card {
  background:#111;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.card img {
  width:100%;
  aspect-ratio:1/1;
  object-fit:contain;
}

.card h3 { margin:10px 0; }
.price { color:#aaa; }

.btn {
  display:inline-block;
  margin-top:10px;
  padding:10px;
  border:1px solid white;
  color:white;
  text-decoration:none;
}
.btn:hover {
  background:white;
  color:black;
}

footer {
  text-align:center;
  padding:20px;
  color:#777;
}
</style>
</head>

<body>

<header>
  <img src="logovantadrift.jpg">
</header>

<!-- SLIDER -->
<div class="slider">

  <div class="slide active">
    <img src="REMERABAPE.jpg">
  </div>

  <div class="slide">
    <img src="REMERAT90.png">
  </div>

  <div class="slide">
    <img src="FOTOPRODUCTOCAMPERABLESSED.jpg">
  </div>

</div>

<!-- PRODUCTOS -->
<section class="products">

<div class="card">
<img src="FOTOPRODUCTOBAPE.png">
<h3>Remera Bape</h3>
<p class="price">$24.999</p>
<a href="https://wa.me/5491122457185?text=Quiero%20la%20Remera%20Bape" class="btn">Comprar</a>
</div>

<div class="card">
<img src="FOTOPRODUCTOT90.png">
<h3>Remera T90</h3>
<p class="price">$17.999</p>
<a href="https://wa.me/5491122457185?text=Quiero%20la%20Remera%20T90" class="btn">Comprar</a>
</div>

<div class="card">
<img src="FOTOPRODUCTONKAIR.jpg">
<h3>Remera NK Air</h3>
<p class="price">$21.999</p>
<a href="https://wa.me/5491122457185?text=Quiero%20la%20Remera%20NK%20Air" class="btn">Comprar</a>
</div>

<div class="card">
<img src="FOTOPRODUCTONY.png">
<h3>Remera NY</h3>
<p class="price">$20.000</p>
<a href="https://wa.me/5491122457185?text=Quiero%20la%20Remera%20NY" class="btn">Comprar</a>
</div>

<div class="card">
<img src="FOTOPRODUCTOREMERABLESSED.png">
<h3>Remera Blessed</h3>
<p class="price">$19.999</p>
<a href="https://wa.me/5491122457185?text=Quiero%20la%20Remera%20Blessed" class="btn">Comprar</a>
</div>

<div class="card">
<img src="CAMPERABLESSED.png">
<h3>Campera Blessed</h3>
<p class="price">$34.999</p>
<a href="https://wa.me/5491122457185?text=Quiero%20la%20Campera%20Blessed" class="btn">Comprar</a>
</div>

<div class="card">
<img src="FOTOPRODUCTOJOGGINGVANTA.jpg">
<h3>Jogging VANTA</h3>
<p class="price">$28.999</p>
<a href="https://wa.me/5491122457185?text=Quiero%20el%20Jogging%20Vanta" class="btn">Comprar</a>
</div>

<div class="card">
<img src="FOTOPRODUCTOJOGGINGBMW.png">
<h3>Jogging BMW</h3>
<p class="price">$24.999</p>
<a href="https://wa.me/5491122457185?text=Quiero%20el%20Jogging%20BMW" class="btn">Comprar</a>
</div>

</section>

<footer>
© VANTA DRIFT
</footer>

<script>
let slides = document.querySelectorAll('.slide');
let index = 0;

setInterval(() => {
  slides[index].classList.remove('active');
  index = (index + 1) % slides.length;
  slides[index].classList.add('active');
}, 3000);
</script>

</body>
</html>
