<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VANTA DRIFT</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #0a0a0a;
      color: white;
    }
    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid #222;
    }
    header h1 {
      font-weight: 600;
      letter-spacing: 2px;
    }
    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #aaa;
      transition: 0.3s;
    }
    nav a:hover { color: white; }

    .hero {
      height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), #0a0a0a), url('https://images.unsplash.com/photo-1520975916090-3105956dac38');
      background-size: cover;
      background-position: center;
    }
    .hero h2 {
      font-size: 48px;
      letter-spacing: 4px;
    }
    .hero p {
      margin-top: 10px;
      color: #ccc;
    }

    .btn {
      margin-top: 20px;
      display: inline-block;
      padding: 12px 24px;
      border: 1px solid white;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }
    .btn:hover {
      background: white;
      color: black;
    }

    .products {
      padding: 60px 40px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }
    .card {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      transition: 0.3s;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    .card img {
      width: 100%;
      border-radius: 10px;
    }
    .card h3 {
      margin-top: 15px;
    }
    .card p {
      color: #aaa;
      margin: 5px 0;
    }

    footer {
      text-align: center;
      padding: 30px;
      border-top: 1px solid #222;
      color: #777;
    }
  </style>
</head>
<body>

<header>
  <h1>VANTA DRIFT</h1>
  <nav>
    <a href="#">Inicio</a>
    <a href="#productos">Drop</a>
    <a href="#">Contacto</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h2>DROP 001</h2>
    <p>Streetwear oscuro. Minimal. Real.</p>
    <a href="#productos" class="btn">Ver colección</a>
  </div>
</section>

<section id="productos" class="products">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1520975661595-6453be3f7070" alt="">
    <h3>Remera Oversize</h3>
    <p>$25.000</p>
  </div>
  <div class="card">
    <img src="https://images.unsplash.com/photo-1514996937319-344454492b37" alt="">
    <h3>Campera Negra</h3>
    <p>$60.000</p>
  </div>
  <div class="card">
    <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b" alt="">
    <h3>Jogging</h3>
    <p>$40.000</p>
  </div>
</section>

<footer>
  <p>© 2026 VANTA DRIFT</p>
</footer>

</body>
</html>
